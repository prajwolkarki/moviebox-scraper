<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieBox - Cloudflare</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a2e;
    --bg4: #222240;
    --text: #ffffff;
    --text2: #8888aa;
    --accent: #e50914;
    --accent2: #ff6b35;
    --accent3: #6c63ff;
    --shadow: 0 4px 30px rgba(0,0,0,.5);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Nav */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, rgba(10,10,15,.98) 60%, transparent);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 32px;
    backdrop-filter: blur(12px);
    transition: background .3s;
  }
  .nav.scrolled { background: rgba(10,10,15,.95); }
  .nav-logo {
    font-size: 24px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    letter-spacing: -1px;
    white-space: nowrap;
  }
  .nav-tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
  .nav-tab {
    padding: 8px 16px;
    border: none; background: transparent;
    color: var(--text2); cursor: pointer;
    font-size: 14px; font-weight: 500;
    border-radius: 20px;
    transition: all .2s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); background: var(--bg3); }
  .nav-tab.active { color: var(--text); background: var(--accent); }
  .nav-search {
    display: flex; align-items: center;
    background: var(--bg3);
    border-radius: 20px;
    padding: 0 12px;
    min-width: 200px;
    transition: all .3s;
    border: 1px solid transparent;
  }
  .nav-search:focus-within {
    border-color: var(--accent);
    background: var(--bg2);
    min-width: 280px;
  }
  .nav-search input {
    background: none; border: none; outline: none;
    color: var(--text); padding: 8px 8px;
    font-size: 14px; width: 100%;
  }
  .nav-search svg { width: 18px; height: 18px; fill: var(--text2); flex-shrink: 0; }

  /* Suggest dropdown */
  .suggest { display: none; }
  .suggest.open {
    display: block;
    position: absolute; top: 56px; right: 24px; width: 320px;
    background: var(--bg3); border-radius: var(--radius-sm);
    box-shadow: var(--shadow); max-height: 400px; overflow-y: auto;
    z-index: 200;
  }
  .suggest-item {
    padding: 10px 14px; cursor: pointer; display: flex; gap: 10px;
    align-items: center; transition: background .15s;
  }
  .suggest-item:hover { background: var(--bg4); }
  .suggest-item img { width: 36px; height: 52px; object-fit: cover; border-radius: 4px; }
  .suggest-item .info { flex: 1; min-width: 0; }
  .suggest-item .info .title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .suggest-item .info .meta { font-size: 11px; color: var(--text2); }

  /* Main content */
  .main { margin-top: 64px; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 400px; font-size: 18px; color: var(--text2);
  }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hero banner */
  .hero {
    position: relative;
    height: 70vh; min-height: 400px; max-height: 600px;
    overflow: hidden;
  }
  .hero-slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity .8s;
    display: flex; align-items: flex-end;
    padding: 60px 48px;
  }
  .hero-slide.active { opacity: 1; }
  .hero-slide .bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
  }
  .hero-slide .bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(0deg, var(--bg) 10%, transparent 50%, rgba(10,10,15,.4) 100%);
  }
  .hero-info { position: relative; z-index: 2; max-width: 560px; }
  .hero-info h1 { font-size: 42px; font-weight: 800; margin-bottom: 8px; line-height: 1.1; text-shadow: 0 2px 20px rgba(0,0,0,.5); }
  .hero-info .desc { font-size: 15px; color: #ccc; line-height: 1.5; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .hero-info .btns { display: flex; gap: 10px; }
  .hero-info .btns button {
    padding: 10px 24px; border: none; border-radius: 6px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #ff1a26; transform: scale(1.03); }
  .btn-secondary { background: rgba(255,255,255,.15); color: #fff; backdrop-filter: blur(4px); }
  .btn-secondary:hover { background: rgba(255,255,255,.25); }

  .hero-dots {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 3;
  }
  .hero-dot {
    width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.3);
    cursor: pointer; transition: all .3s; border: none;
  }
  .hero-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

  /* Sections */
  .section { padding: 16px 48px 32px; }
  .section-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 16px;
  }
  .section-header h2 { font-size: 22px; font-weight: 700; }
  .section-header .see-all {
    font-size: 13px; color: var(--text2); cursor: pointer;
    transition: color .2s;
  }
  .section-header .see-all:hover { color: var(--accent); }

  .row {
    display: flex; gap: 12px; overflow-x: auto;
    padding-bottom: 8px; scroll-snap-type: x mandatory;
  }
  .row::-webkit-scrollbar { height: 4px; }

  /* Cards */
  .card {
    flex: 0 0 auto;
    width: 180px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: all .25s;
    scroll-snap-align: start;
    background: var(--bg3);
    position: relative;
  }
  .card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 8px 40px rgba(229,9,20,.25); }
  .card-poster {
    width: 100%; aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--bg4);
  }
  .card-info { padding: 10px 10px 12px; }
  .card-info .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-info .meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .card .badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 4px;
  }

  /* Loading placeholder */
  .card.skeleton .card-poster { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  .card.skeleton .card-info > div { height: 12px; background: var(--bg4); border-radius: 4px; margin-bottom: 6px; }
  .card.skeleton .card-info > div:last-child { width: 60%; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Grid view (search results) */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; padding: 0 48px 40px; }
  .section-header-wrapper { display: flex; align-items: center; justify-content: space-between; padding: 16px 48px 0; flex-wrap: wrap; gap: 8px; }
  .section-header-wrapper h2 { font-size: 22px; font-weight: 700; }

  /* Detail modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    overflow-y: auto;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--bg2);
    border-radius: var(--radius);
    max-width: 900px; width: 100%;
    overflow: hidden;
    animation: modalIn .3s ease;
    position: relative;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-close {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: rgba(0,0,0,.6);
    color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .modal-close:hover { background: rgba(229,9,20,.8); }
  .modal-hero {
    position: relative; height: 360px; overflow: hidden;
  }
  .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
  .modal-hero .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, var(--bg2) 5%, transparent 60%);
  }
  .modal-body { padding: 24px 32px 32px; }
  .modal-body h1 { font-size: 28px; margin-bottom: 8px; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .modal-tags span {
    font-size: 12px; padding: 3px 10px; border-radius: 12px;
    background: var(--bg3); color: var(--text2);
  }
  .modal-body .desc { color: #bbb; line-height: 1.6; font-size: 14px; margin-bottom: 20px; }
  .modal-body .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 13px; }
  .modal-body .detail-grid dt { color: var(--text2); }
  .modal-body .detail-grid dd { color: var(--text); }

  .modal-body h3 { font-size: 18px; margin-bottom: 12px; margin-top: 24px; }
  .season-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .season-tab {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--bg4); background: transparent;
    color: var(--text2); cursor: pointer; font-size: 13px;
    transition: all .2s;
  }
  .season-tab:hover { border-color: var(--accent); color: var(--text); }
  .season-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .episode-card {
    padding: 10px 14px; border-radius: var(--radius-sm);
    background: var(--bg3); cursor: pointer; transition: all .2s;
  }
  .episode-card:hover { background: var(--accent); }
  .episode-card .ep-num { font-size: 12px; color: var(--text2); }
  .episode-card:hover .ep-num { color: rgba(255,255,255,.7); }

  .stream-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .stream-link {
    padding: 8px 16px; border-radius: 6px;
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all .2s;
  }
  .stream-link.play { background: var(--accent); color: #fff; }
  .stream-link.play:hover { background: #ff1a26; }
  .stream-link.res { background: var(--bg3); color: var(--text2); }
  .stream-link.res:hover { background: var(--bg4); color: var(--text); }
  .stream-link.active { background: var(--accent); color: #fff; }

/* ---- Custom Player ---- */
.player-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0;
  height: 100vh;
  z-index: 600;
  background: #000;
  flex-direction: column;
  user-select: none;
}
.player-overlay.open { display: flex; }
.player-overlay video {
  width: 100%; height: 100%;
  outline: none;
  pointer-events: none;
}

.player-top {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(0,0,0,.7) 0%, transparent);
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.player-overlay.ctrl-active .player-top { opacity: 1; }
.player-top .title {
  flex: 1; font-size: 15px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-top button {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: rgba(0,0,0,.5);
  color: #fff; font-size: 18px; cursor: pointer;
  flex-shrink: 0; transition: background .2s;
  pointer-events: auto;
}
.player-top button:hover { background: rgba(229,9,20,.8); }

.player-video-wrap {
  flex: 1; position: relative;
  display: flex; align-items: center; justify-content: center;
}

.player-center-play {
  position: absolute; z-index: 10;
  width: 70px; height: 70px; border-radius: 50%;
  background: rgba(229,9,20,.85);
  color: #fff; font-size: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s;
  opacity: 0; transform: scale(.8);
  pointer-events: none;
  border: none;
}
.player-center-play.show { opacity: 1; transform: scale(1); pointer-events: auto; }
.player-center-play:hover { background: var(--accent); transform: scale(1.05); }

/* Controls bar */
.player-controls {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  background: linear-gradient(0deg, rgba(0,0,0,.8) 0%, transparent);
  padding: 0 12px 8px;
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.player-overlay.ctrl-active .player-controls { opacity: 1; pointer-events: auto; }

.player-progress {
  width: 100%; height: 5px;
  background: rgba(255,255,255,.2);
  border-radius: 3px; cursor: pointer;
  position: relative; margin-bottom: 6px;
  transition: height .15s;
}
.player-progress:hover { height: 8px; }
.player-progress-fill {
  height: 100%; border-radius: 3px;
  background: var(--accent); width: 0;
  position: relative; transition: width .1s linear;
}
.player-progress-fill::after {
  content: ''; position: absolute; right: -6px; top: -4px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); opacity: 0;
  transition: opacity .15s;
}
.player-progress:hover .player-progress-fill::after { opacity: 1; }
.player-progress-buffer {
  position: absolute; top: 0; left: 0; height: 100%;
  background: rgba(255,255,255,.15); border-radius: 3px;
}

.player-controls-row {
  display: flex; align-items: center; gap: 8px;
  height: 40px;
}
.player-btn {
  background: none; border: none; color: #fff;
  cursor: pointer; padding: 4px 6px;
  font-size: 13px; white-space: nowrap;
  border-radius: 4px; transition: background .15s;
  display: flex; align-items: center; gap: 4px;
  height: 32px;
}
.player-btn:hover { background: rgba(255,255,255,.12); }
.player-btn.icon { font-size: 18px; padding: 4px 8px; }
.player-time { font-size: 12px; color: rgba(255,255,255,.8); font-variant-numeric: tabular-nums; white-space: nowrap; }
.player-spacer { flex: 1; }

.player-ep-btn { font-size: 12px; background: rgba(255,255,255,.08); padding: 4px 10px; border-radius: 4px; }
.player-ep-btn:disabled { opacity: .3; cursor: default; }
.player-ep-btn:disabled:hover { background: rgba(255,255,255,.08); }
.player-ep-btn:hover { background: rgba(255,255,255,.18); }
.player-ep-btn .label { font-size: 10px; opacity: .6; }

/* Settings panels */
.player-settings-group { position: relative; }
.player-settings-panel {
  display: none;
  position: absolute; bottom: 100%; right: 0; margin-bottom: 4px;
  background: rgba(20,20,35,.96);
  border-radius: 8px; padding: 6px;
  min-width: 140px;
  box-shadow: 0 -4px 20px rgba(0,0,0,.5);
  backdrop-filter: blur(12px);
}
.player-settings-panel.open { display: block; }
.player-settings-panel .opt {
  display: block; width: 100%;
  padding: 7px 12px; border: none; background: none;
  color: rgba(255,255,255,.7); cursor: pointer;
  text-align: left; font-size: 12px; border-radius: 4px;
  white-space: nowrap;
}
.player-settings-panel .opt:hover { background: rgba(255,255,255,.1); color: #fff; }
.player-settings-panel .opt.active { color: var(--accent); font-weight: 600; background: rgba(229,9,20,.1); }
.player-settings-panel .opt .sub { font-size: 10px; opacity: .5; margin-left: 6px; }

.player-volume-wrap { display: flex; align-items: center; gap: 4px; }
.player-volume-slider {
  width: 0; overflow: hidden; transition: width .2s;
  height: 24px; display: flex; align-items: center;
}
.player-volume-wrap:hover .player-volume-slider { width: 60px; }
.player-volume-slider input[type=range] {
  width: 60px; height: 3px;
  -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,.3); border-radius: 2px; outline: none;
}
.player-volume-slider input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #fff; cursor: pointer;
}

@media (max-width: 768px) {
  .player-btn.icon { font-size: 16px; padding: 4px 6px; }
  .player-ep-btn { font-size: 11px; padding: 2px 8px; }
  .player-time { font-size: 11px; }
  .player-top .title { font-size: 13px; }
  .player-center-play { width: 56px; height: 56px; font-size: 24px; }
}

  /* Responsive */
  @media (max-width: 768px) {
    .nav { padding: 0 12px; gap: 12px; }
    .nav-logo { font-size: 20px; }
    .nav-tabs { gap: 2px; }
    .nav-tab { padding: 6px 10px; font-size: 12px; }
    .nav-search { min-width: 120px; }
    .nav-search:focus-within { min-width: 160px; }
    .hero-info h1 { font-size: 26px; }
    .hero { height: 50vh; min-height: 300px; }
    .hero-slide { padding: 30px 20px; }
    .section { padding: 12px 16px 24px; }
    .section-header h2 { font-size: 18px; }
    .card { width: 140px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); padding: 0 16px 24px; gap: 10px; }
    .section-header-wrapper { padding: 12px 16px 0; }
    .modal-body { padding: 16px; }
    .modal-hero { height: 220px; }
    .modal-body h1 { font-size: 22px; }
    .modal-body .detail-grid { grid-template-columns: 1fr; }
    .suggest.open { right: 12px; width: calc(100% - 24px); }
  }
  @media (max-width: 480px) {
    .card { width: 120px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .hero-info .btns button { font-size: 13px; padding: 8px 16px; }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav" id="nav">
  <div class="nav-logo" onclick="loadHome()">MovieBox</div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="home">Home</button>
    <button class="nav-tab" data-tab="movies">Movies</button>
    <button class="nav-tab" data-tab="tv">TV Series</button>
    <button class="nav-tab" data-tab="animation">Animation</button>
    <button class="nav-tab" data-tab="ranking">Ranking</button>
  </div>
  <div class="nav-search" id="navSearch">
    <input type="text" placeholder="Search..." id="searchInput" autocomplete="off">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>
  <div class="suggest" id="suggest"></div>
</nav>

<!-- Main -->
<div class="main" id="main"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent">
    <button class="modal-close" onclick="closeDetail()">&times;</button>
    <div class="modal-hero">
      <img id="detailBg" src="" alt="">
      <div class="gradient"></div>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Custom Player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-top">
    <span class="title" id="playerTitle"></span>
    <button onclick="closePlayer()">&times;</button>
  </div>

  <div class="player-video-wrap" id="playerVideoWrap" onclick="handlePlayerClick(event)">
    <video id="player" autoplay></video>
    <button class="player-center-play" id="playerCenterPlay" onclick="togglePlay()">▶</button>

    <div class="player-controls" id="playerControls">
      <div class="player-progress" id="playerProgress" onclick="seekPlayer(event)">
        <div class="player-progress-buffer" id="playerBuffer"></div>
        <div class="player-progress-fill" id="playerProgressFill"></div>
      </div>

      <div class="player-controls-row">
        <button class="player-btn icon" onclick="togglePlay()" id="playerPlayBtn">⏸</button>

        <span class="player-time" id="playerTime">0:00 / 0:00</span>

        <div class="player-volume-wrap">
          <button class="player-btn icon" onclick="toggleMute()" id="playerMuteBtn">🔊</button>
          <div class="player-volume-slider">
            <input type="range" min="0" max="1" step="0.05" value="1" id="playerVolume" oninput="setVolume(this.value)">
          </div>
        </div>

        <div class="player-spacer"></div>

        <button class="player-btn player-ep-btn" id="playerPrevBtn" onclick="prevEpisode()" disabled>
          <span class="label">Prev</span> ⏮
        </button>
        <button class="player-btn player-ep-btn" id="playerNextBtn" onclick="nextEpisode()" disabled>
          ⏭ <span class="label">Next</span>
        </button>

        <div class="player-settings-group">
          <button class="player-btn" onclick="toggleSettings('res',event)">⚙ <span id="playerResLabel">Auto</span></button>
          <div class="player-settings-panel" id="playerResPanel"></div>
        </div>

        <div class="player-settings-group">
          <button class="player-btn" onclick="toggleSettings('dub',event)">🔊 <span id="playerDubLabel">Original</span></button>
          <div class="player-settings-panel" id="playerDubPanel"></div>
        </div>

        <div class="player-settings-group">
          <button class="player-btn" onclick="toggleSettings('sub',event)">📝 <span id="playerSubLabel">Off</span></button>
          <div class="player-settings-panel" id="playerSubPanel"></div>
        </div>

        <button class="player-btn icon" onclick="toggleFullscreen()">⛶</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://moviebox-stream-proxy.movieboxproxy.workers.dev';

const TABS = { home: 0, movies: 1, tv: 2, animation: 3, ranking: 4 };
const TAB_NAMES = { home: 'Home', movies: 'Movies', tv: 'TV Series', animation: 'Animation', ranking: 'Ranking' };

let state = { tab: 'home', sections: [], detail: null, season: 1, resolution: 0, dub: null, dubs: [] };
let ps = { sid: null, se: 0, ep: 0, res: 0, dub: null, streams: [], dubs: [], subs: [], isSeries: false, title: '', episodes: [], seTotal: 0, epTotal: 0, controlsTimer: null, settingsOpen: null };

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

async function get(path) {
  const r = await fetch(`${API}${path}`);
  const j = await r.json();
  if (!j.ok) throw new Error(j.error);
  return j.data;
}

function render(html) { $('#main').innerHTML = html; }

function renderLoading() {
  render(`<div class="loading"><div class="spinner"></div></div>`);
}

function extractItems(section) {
  if (section.subjects && section.subjects.length) return section.subjects;
  if (section.type === 'CUSTOM' && section.customData?.items) {
    return section.customData.items.map(i => i.subject || i).filter(i => i && i.subjectId && i.title);
  }
  if (section.type === 'BANNER' && section.banner?.banners) {
    return section.banner.banners.map(b => b.subject || b).filter(Boolean);
  }
  if (section.type === 'FILTER' && section.filters) {
    return section.filters;
  }
  return [];
}

function normalizeSection(s) {
  return { ...s, items: extractItems(s) };
}

async function loadHome() {
  setActiveTab('home');
  renderLoading();
  try {
    const [banner, data] = await Promise.all([
      get('/home/banner'),
      get('/home'),
    ]);
    state.tab = 'home';
    state.sections = (data.items || []).map(normalizeSection);
    const normalizedBanner = (banner || []).map(normalizeSection);
    renderHome(normalizedBanner, state.sections);
  } catch (e) {
    render(`<div class="loading" style="color:var(--accent)">Failed to load: ${e.message}</div>`);
  }
}

async function loadCategory(tab) {
  setActiveTab(tab);
  renderLoading();
  try {
    const key = tab === 'tv' ? 'tv-series' : tab;
    const data = await get(`/${key}`);
    state.tab = tab;
    state.sections = (data.items || []).map(normalizeSection);
    renderCategory(TAB_NAMES[tab] || tab, state.sections);
  } catch (e) {
    render(`<div class="loading" style="color:var(--accent)">Failed to load: ${e.message}</div>`);
  }
}

function renderHome(banner, sections) {
  const bannerItems = banner.flatMap(s => s.items || []);
  const hero = bannerItems.length ? renderHero(bannerItems) : '';
  const sectionRows = sections.map(s => renderSectionRow(s)).filter(Boolean).join('');
  render(`${hero}<div class="content">${sectionRows}</div>`);
  initHero();
}

function renderCategory(name, sections) {
  const sectionRows = sections.map(s => renderSectionRow(s)).filter(Boolean).join('');
  render(`<div style="padding-top:16px"><div class="section-header-wrapper"><h2>${name}</h2></div>${sectionRows}</div>`);
}

function renderHero(items) {
  return `<div class="hero" id="hero">${items.slice(0, 6).map((item, i) => `
    <div class="hero-slide${i === 0 ? ' active' : ''}" data-idx="${i}">
      <div class="bg" style="background-image:url(${item.cover?.url || ''})"></div>
      <div class="hero-info">
        <h1>${item.title || ''}</h1>
        <div class="desc">${item.desc || item.description || ''}</div>
        <div class="btns">
          <button class="btn-primary" onclick="openDetail('${item.subjectId || ''}','${(item.detailUrl || '').split('/').pop()}')">▶ Play</button>
          <button class="btn-secondary" onclick="openDetail('${item.subjectId || ''}','${(item.detailUrl || '').split('/').pop()}')">ℹ More Info</button>
        </div>
      </div>
    </div>`).join('')}
    <div class="hero-dots">${items.slice(0, 6).map((_, i) => `<button class="hero-dot${i === 0 ? ' active' : ''}" data-idx="${i}"></button>`).join('')}</div>
  </div>`;
}

function renderSectionRow(section) {
  if (!section.items || !section.items.length) return '';
  if (section.type === 'FILTER') return '';
  return `<div class="section">
    <div class="section-header">
      <h2>${section.title || section.name || ''}</h2>
      <span class="see-all" onclick="openSection('${section.title || section.name || ''}')">See All</span>
    </div>
    <div class="row">${section.items.map(item => renderCard(item)).join('')}</div>
  </div>`;
}

function renderCard(item) {
  const img = item.cover?.url || '';
  const subjId = item.subjectId || item.id || '';
  const slug = (item.detailUrl || '').split('/').pop() || subjId;
  const year = item.releaseDate ? (item.releaseDate + '').slice(0, 4) : '';
  const type = item.subjectType === 2 ? 'TV' : item.subjectType === 1 ? 'Movie' : '';
  return `<div class="card" onclick="openDetail('${subjId}','${slug}')">
    <img class="card-poster" src="${img}" alt="" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%222%22 height=%223%22><rect fill=%22%23222240%22 width=%222%22 height=%223%22/></svg>'">
    ${type ? `<span class="badge">${type}</span>` : ''}
    <div class="card-info">
      <div class="title">${item.title || ''}</div>
      ${year ? `<div class="meta">${year}</div>` : ''}
    </div>
  </div>`;
}

/* ---- Hero carousel ---- */
let heroInterval;

function initHero() {
  clearInterval(heroInterval);
  const slides = $$('.hero-slide');
  const dots = $$('.hero-dot');
  if (!slides.length) return;
  let idx = 0;
  function go(i) {
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    idx = (i + slides.length) % slides.length;
    slides[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  dots.forEach(d => d.addEventListener('click', () => go(+d.dataset.idx)));
  heroInterval = setInterval(() => go(idx + 1), 5000);
  document.addEventListener('click', function heroClick(e) {
    if (e.target.closest('.hero') && !e.target.closest('.btns') && !e.target.closest('.hero-dots')) {
      const active = document.querySelector('.hero-slide.active');
      if (active) go(+active.dataset.idx + 1);
    }
  }, { once: false });
}

/* ---- See All (section detail) ---- */
async function openSection(name) {
  const tab = state.tab;
  const key = tab === 'tv' ? 'tv-series' : tab;
  renderLoading();
  try {
    const data = await get(`/${key}/section/${encodeURIComponent(name)}`);
    const items = extractItems(data);
    render(`<div style="padding-top:16px">
      <div class="section-header-wrapper">
        <h2>${name}</h2>
        <span style="color:var(--accent);cursor:pointer;font-size:14px" onclick="${tab === 'home' ? 'loadHome()' : `loadCategory('${tab}')`}">← Back</span>
      </div>
      ${items.length ? `<div class="grid">${items.map(item => renderCard(item)).join('')}</div>`
        : `<div class="loading" style="min-height:200px">No items in this section</div>`}
    </div>`);
  } catch (e) {
    render(`<div class="loading" style="color:var(--accent)">Error: ${e.message}</div>`);
  }
}

/* ---- Search ---- */
let searchTimer;
$('#searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = $('#searchInput').value.trim();
  if (!q) { $('#suggest').classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSuggest(q), 250);
});
$('#searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    $('#suggest').classList.remove('open');
    doSearch($('#searchInput').value.trim());
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.nav-search') && !e.target.closest('.suggest'))
    $('#suggest').classList.remove('open');
});

async function doSuggest(q) {
  try {
    const data = await get(`/search/suggest?q=${encodeURIComponent(q)}`);
    const el = $('#suggest');
    if (!data || !data.length) { el.classList.remove('open'); return; }
    el.innerHTML = data.slice(0, 8).map(item => `
      <div class="suggest-item" onclick="selectSuggest('${item.subjectId || ''}','${(item.detailUrl || '').split('/').pop() || ''}')">
        <img src="${item.coverUrl || ''}" alt="" onerror="this.style.display='none'">
        <div class="info">
          <div class="title">${item.title || ''}</div>
          <div class="meta">${item.releaseDate || ''}</div>
        </div>
      </div>`).join('');
    el.classList.add('open');
  } catch { $('#suggest').classList.remove('open'); }
}

function selectSuggest(id, slug) {
  $('#suggest').classList.remove('open');
  $('#searchInput').value = '';
  openDetail(id, slug);
}

async function doSearch(q) {
  if (!q) return;
  $('#searchInput').blur();
  renderLoading();
  try {
    const data = await get(`/search?q=${encodeURIComponent(q)}`);
    const items = data.items || data.results?.[0]?.subjects || [];
    render(`<div style="padding-top:16px">
      <div class="section-header-wrapper">
        <h2>Search: "${q}"</h2>
        <span style="color:var(--accent);cursor:pointer;font-size:14px" onclick="loadHome()">← Home</span>
      </div>
      ${items.length ? `<div class="grid">${items.map(item => renderCard(item)).join('')}</div>`
        : `<div class="loading" style="min-height:200px">No results found</div>`}
    </div>`);
  } catch (e) {
    render(`<div class="loading" style="color:var(--accent)">Search error: ${e.message}</div>`);
  }
}

/* ---- Nav ---- */
$$('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    if (t === 'home') loadHome();
    else loadCategory(t);
  });
});

function setActiveTab(tab) {
  $$('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  state.tab = tab;
}

/* ---- Detail ---- */
async function openDetail(subjId, slug) {
  renderLoadingDetail();
  $('#detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  try {
    const id = subjId || '';
    const url = slug ? `/detail/${slug}${id ? `?id=${id}` : ''}` : `/detail/${slug}?id=${id}`;
    const data = await get(slug ? url : `/detail/slug?id=${id}`);
    state.detail = data;
    state.season = 1;
    state.resolution = 0;
    state.dub = null;
    state.dubs = [];

    const sid = data.subjectId || subjId;

    let dubs = [];
    if (sid) {
      try {
        const dubData = await get(`/dubs/${sid}`);
        dubs = dubData.dubs || [];
        state.dubs = dubs;
      } catch { /* no dubs available */ }
    }

    const img = data.cover?.url || data.coverUrl || '';
    const year = data.releaseDate ? (data.releaseDate + '').slice(0, 4) : '';
    const genres = data.genres || data.category || [];
    const gList = Array.isArray(genres) ? genres : genres ? [genres] : [];
    const desc = data.desc || data.description || data.introduction || 'No description available.';
    const typeName = data.subjectType === 2 ? 'TV Series' : data.subjectType === 1 ? 'Movie' : '';
    const region = data.region || '';
    const rating = data.score || data.rating || '';

    let html = `<div id="detailBgImg" data-src="${img}"></div>
    <h1>${data.title || ''}</h1>
    <div class="modal-tags">
      ${typeName ? `<span>${typeName}</span>` : ''}
      ${year ? `<span>${year}</span>` : ''}
      ${region ? `<span>${region}</span>` : ''}
      ${rating ? `<span>★ ${rating}</span>` : ''}
      ${gList.map(g => `<span>${g}</span>`).join('')}
    </div>
    <div class="desc">${desc}</div>`;

    if (sid) {
      html += `<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <button class="stream-link play" onclick="playStream('${sid}')">▶ Watch Now</button>
        <button class="stream-link res" onclick="showStreams('${sid}')">📥 Available Streams</button>
      </div>`;
    }

    const nonOriginal = dubs.filter(d => !d.original);
    if (nonOriginal.length > 0) {
      html += `<h3>Audio</h3><div class="stream-links" id="dubSelector">`;
      html += `<button class="stream-link${!state.dub ? ' active' : ''} res" onclick="selectDub(null)">🔈 Original</button>`;
      for (const d of nonOriginal) {
        const active = state.dub === d.lanName || state.dub === d.lanCode;
        html += `<button class="stream-link${active ? ' active' : ''} res" onclick="selectDub('${d.lanName}')">🔊 ${d.lanName}</button>`;
      }
      html += `</div>`;
    }

    html += `<div class="detail-grid">
      ${data.releaseDate ? `<dt>Release</dt><dd>${data.releaseDate}</dd>` : ''}
      ${data.duration ? `<dt>Duration</dt><dd>${data.duration}</dd>` : ''}
      ${data.score ? `<dt>Rating</dt><dd>★ ${data.score}</dd>` : ''}
      ${data.region ? `<dt>Region</dt><dd>${data.region}</dd>` : ''}
      ${data.language ? `<dt>Language</dt><dd>${data.language}</dd>` : ''}
    </div>`;

    if (data.cast && data.cast.length) {
      html += `<h3>Cast</h3><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${data.cast.slice(0, 10).map(c => `<span style="padding:4px 12px;background:var(--bg3);border-radius:6px;font-size:13px">${c.name || c}</span>`).join('')}</div>`;
    }

    if (data.subjectType === 2 || data.subjectType === '2') {
      const seasons = data.seasons || [];
      if (seasons.length) {
        html += `<h3>Seasons</h3><div class="season-tabs">${seasons.map((s, i) => `<button class="season-tab${i === 0 ? ' active' : ''}" onclick="selectSeason(${s.season || i + 1}, this)">Season ${s.season || i + 1}</button>`).join('')}</div>`;
        html += `<div id="episodes"></div>`;
      }
    } else if (data.streams && data.streams.length) {
      html += renderStreamsSection(data.streams);
    }

    $('#detailBody').innerHTML = html;

    const bg = $('#detailBg');
    bg.src = img;
    bg.style.background = `linear-gradient(135deg, var(--bg3), var(--bg))`;

    if ((data.subjectType === 2 || data.subjectType === '2') && data.seasons?.length) {
      loadEpisodes(subjId || data.subjectId, data.seasons[0].season || 1);
    }
  } catch (e) {
    $('#detailBody').innerHTML = `<div style="color:var(--accent);padding:40px;text-align:center">Error: ${e.message}</div>`;
  }
}

function renderLoadingDetail() {
  $('#detailBody').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
}

function closeDetail() {
  $('#detailModal').classList.remove('open');
  document.body.style.overflow = '';
  state.detail = null;
}

$('#detailModal').addEventListener('click', e => {
  if (e.target === $('#detailModal')) closeDetail();
});

async function loadEpisodes(sid, season) {
  if (!sid) return;
  state.season = season;
  try {
    const dubParam = state.dub ? `&dub=${encodeURIComponent(state.dub)}` : '';
    const data = await get(`/api/stream/${sid}?se=${season}${dubParam}`);
    const list = data.streams || [];
    const epMap = {};
    list.forEach(s => {
      const ep = s.episode || s.ep || 0;
      if (!epMap[ep]) epMap[ep] = [];
      epMap[ep].push(s);
    });
    const eps = Object.keys(epMap).sort((a, b) => a - b);
    if (!eps.length) { $('#episodes').innerHTML = '<div style="color:var(--text2)">No episodes found.</div>'; return; }
    $('#episodes').innerHTML = `<div class="episode-grid">${eps.map(ep => `
      <div class="episode-card" onclick="playStream('${sid}','${season}','${ep}')">
        <div class="ep-num">Episode ${ep}</div>
        <div style="font-size:13px;margin-top:2px">▶ Play</div>
      </div>`).join('')}</div>`;
  } catch {
    $('#episodes').innerHTML = '<div style="color:var(--text2)">Could not load episodes.</div>';
  }
}

function selectDub(lang) {
  state.dub = lang;
  $$('#dubSelector .stream-link').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function selectSeason(s, btn) {
  $$('.season-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const sid = state.detail?.subjectId || '';
  loadEpisodes(sid, s);
}

function renderStreamsSection(streams) {
  if (!streams || !streams.length) return '';
  return `<h3>Streams</h3><div class="stream-links">${streams.map(s => `
    <button class="stream-link play" onclick="playStream('${s.subjectId || state.detail?.subjectId || ''}','${s.season || 0}','${s.episode || 0}','${s.resolution || 0}')">${s.resolution || 'HD'}p</button>
  `).join('')}</div>`;
}

async function showStreams(sid) {
  if (!sid) return;
  try {
    const dubParam = state.dub ? `&dub=${encodeURIComponent(state.dub)}` : '';
    const data = await get(`/api/stream/${sid}${dubParam}`);
    const streams = data.streams || [];
    const html = `<h3>Available Streams</h3><div class="stream-links">${streams.map(s => `
      <button class="stream-link play" onclick="playStream('${sid}','${s.season || 0}','${s.episode || 0}','${s.resolution || 0}')">${s.resolution || 'HD'}p${s.season ? ` S${s.season}` : ''}${s.episode ? `E${s.episode}` : ''}</button>
    `).join('')}</div>`;
    const el = document.createElement('div');
    el.innerHTML = html;
    $('#detailBody').appendChild(el);
  } catch (e) {
    alert('Could not load streams: ' + e.message);
  }
}

// ==========================================================================
// Custom Player
// ==========================================================================

async function playStream(sid, se = 0, ep = 0, res = 0) {
  ps.sid = sid; ps.se = se; ps.ep = ep; ps.res = res;
  ps.dub = state.dub;
  ps.title = state.detail?.title || '';
  ps.isSeries = (state.detail?.subjectType === 2 || state.detail?.subjectType === '2');

  const overlay = $('#playerOverlay');
  overlay.classList.add('open');
  overlay.style.height = window.innerHeight + 'px';
  $('#playerTitle').textContent = ps.title + (ps.isSeries ? ` — S${se}E${ep}` : '');

  await loadStreamData();
}

async function loadStreamData() {
  const player = $('#player');
  try {
    const dubParam = ps.dub ? `&dub=${encodeURIComponent(ps.dub)}` : '';

    const data = await get(`/api/stream/${ps.sid}?se=${ps.se}&ep=0&resolution=0${dubParam}`);
    ps.streams = (data.streams || []);

    if (!ps.streams.length) { alert('No streams available.'); closePlayer(); return; }

    const epMap = {};
    ps.streams.forEach(s => {
      const e = s.episode || s.ep || 0;
      if (e && !epMap[e]) { epMap[e] = []; }
      if (e) epMap[e].push(s);
    });
    const allEps = Object.keys(epMap).map(Number).sort((a, b) => a - b);
    ps.episodes = allEps;
    ps.epTotal = allEps.length;

    const curEp = allEps.includes(ps.ep) ? ps.ep : (allEps[0] || 0);
    ps.ep = curEp;

    const curStreams = epMap[curEp] || ps.streams;

    const resolutions = [...new Set(curStreams.map(s => s.resolution || 0))].sort((a, b) => b - a);
    renderResOptions(resolutions);

    const match = ps.res ? curStreams.find(s => s.resolution === +ps.res) : null;
    const stream = match || curStreams[0];
    if (stream) ps.res = stream.resolution || 0;

    const watchUrl = `${API}/watch/${ps.sid}?se=${ps.se}&ep=${ps.ep}&resolution=${ps.res}${dubParam}`;
    const wasPlaying = !player.paused;
    player.src = watchUrl;
    if (wasPlaying) player.play().catch(() => {});
    player.play().catch(() => {});

    $('#playerResLabel').textContent = ps.res ? `${ps.res}p` : 'Auto';

    updatePlayerTitle();

    if (ps.isSeries && ps.epTotal > 0) {
      updateEpButtons();
    } else {
      ps.episodes = [];
      ps.epTotal = 0;
      $('#playerPrevBtn').disabled = true;
      $('#playerNextBtn').disabled = true;
    }

    if (state.dubs && state.dubs.length) renderDubOptions(state.dubs);

    loadSubtitleOptions(ps.sid);
  } catch (e) {
    alert('Stream error: ' + e.message);
    closePlayer();
  }
}

function updatePlayerTitle() {
  const epStr = ps.isSeries && ps.epTotal
    ? ` — S${ps.se}·E${ps.ep}/${ps.epTotal}`
    : '';
  $('#playerTitle').textContent = ps.title + epStr;
}

function renderResOptions(resolutions) {
  const panel = $('#playerResPanel');
  panel.innerHTML = resolutions.map(r =>
    `<button class="opt${r === ps.res ? ' active' : ''}" onclick="changeResolution(${r})">${r}p</button>`
  ).join('');
}

function changeResolution(res) {
  ps.res = res;
  $('#playerResLabel').textContent = res ? `${res}p` : 'Auto';
  closeAllSettings();
  loadStreamData();
}

function renderDubOptions(dubs) {
  const nonOrig = dubs.filter(d => !d.original);
  if (!nonOrig.length) { $('#playerDubPanel').innerHTML = ''; return; }
  const panel = $('#playerDubPanel');
  const items = [{ lanName: 'Original', lanCode: '' }, ...nonOrig];
  panel.innerHTML = items.map(d =>
    `<button class="opt${(ps.dub === d.lanName || (!ps.dub && !d.lanName)) ? ' active' : ''}" onclick="changeDub('${d.lanName}')">🔊 ${d.lanName}</button>`
  ).join('');
}

function changeDub(lang) {
  ps.dub = lang || null;
  state.dub = ps.dub;
  $('#playerDubLabel').textContent = lang || 'Original';
  closeAllSettings();
  loadStreamData();
}

let _subtitleTrack = null;
let psCaptions = [];

async function loadSubtitleOptions(sid) {
  const panel = $('#playerSubPanel');
  psCaptions = [];
  try {
    const data = await get(`/subtitles/${sid}`);
    const langs = data.subtitle_languages || [];

    const resId = ps.streams?.[0]?.resourceId;
    if (resId) {
      try {
        const capData = await get(`/subtitles/${sid}/${resId}`);
        psCaptions = (capData.captions || []).map(c => ({
          lan: c.lan,
          lanName: c.lanName,
          url: c.url,
        }));
      } catch { /* captions not available via resourceId */ }
    }

    if (psCaptions.length) {
      panel.innerHTML = `<button class="opt active" onclick="toggleSubtitle(null)">Off</button>` +
        psCaptions.map(c =>
          `<button class="opt" onclick="toggleSubtitle('${c.lanName}','${c.url}')">${c.lanName}</button>`
        ).join('');
    } else if (langs.length) {
      panel.innerHTML = `<button class="opt active" onclick="toggleSubtitle(null)">Off</button>` +
        langs.map(l => `<button class="opt" onclick="toggleSubtitle('${l}','')">${l} (no URL)</button>`).join('');
    } else {
      panel.innerHTML = '';
    }
  } catch { panel.innerHTML = ''; }
}

function toggleSubtitle(lang, url) {
  const player = $('#player');
  if (_subtitleTrack) { _subtitleTrack.remove(); _subtitleTrack = null; }
  closeAllSettings();

  if (!lang || !url) {
    $('#playerSubLabel').textContent = lang || 'Off';
    return;
  }

  _subtitleTrack = document.createElement('track');
  _subtitleTrack.kind = 'subtitles';
  _subtitleTrack.label = lang;
  _subtitleTrack.srclang = 'und';
  _subtitleTrack.src = `${API}/subtitles/proxy?url=${encodeURIComponent(url)}`;
  _subtitleTrack.default = true;
  player.appendChild(_subtitleTrack);
  $('#playerSubLabel').textContent = lang;
}

function updateEpButtons() {
  const prevBtn = $('#playerPrevBtn');
  const nextBtn = $('#playerNextBtn');
  const idx = ps.episodes.indexOf(ps.ep);
  prevBtn.disabled = idx <= 0;
  nextBtn.disabled = idx < 0 || idx >= ps.episodes.length - 1;
}

function nextEpisode() {
  const idx = ps.episodes.indexOf(ps.ep);
  if (idx < 0 || idx >= ps.episodes.length - 1) return;
  ps.ep = ps.episodes[idx + 1];
  $('#playerTitle').textContent = ps.title + (ps.isSeries ? ` — S${ps.se}E${ps.ep}` : '');
  loadStreamData();
}

function prevEpisode() {
  const idx = ps.episodes.indexOf(ps.ep);
  if (idx <= 0) return;
  ps.ep = ps.episodes[idx - 1];
  $('#playerTitle').textContent = ps.title + (ps.isSeries ? ` — S${ps.se}E${ps.ep}` : '');
  loadStreamData();
}

// ---- Player controls ----

window.addEventListener('resize', () => {
  const o = $('#playerOverlay');
  if (o.classList.contains('open')) o.style.height = window.innerHeight + 'px';
});

function handlePlayerClick(e) {
  if (e.target.closest('.player-controls') || e.target.closest('.player-top')) return;
  togglePlay();
}

function togglePlay() {
  const player = $('#player');
  if (player.paused) {
    player.play().catch(() => {});
  } else {
    player.pause();
  }
}

function showControls() {
  const o = $('#playerOverlay');
  o.classList.add('ctrl-active');
  clearTimeout(ps.controlsTimer);
}

function hideControls(delay = 3000) {
  clearTimeout(ps.controlsTimer);
  ps.controlsTimer = setTimeout(() => {
    if (player?.paused) return;
    $('#playerOverlay').classList.remove('ctrl-active');
  }, delay);
}

$('#playerOverlay').addEventListener('mouseenter', () => {
  showControls();
});
$('#playerOverlay').addEventListener('mouseleave', () => {
  hideControls(1500);
});

function closeAllSettings() {
  $$('.player-settings-panel').forEach(p => p.classList.remove('open'));
  ps.settingsOpen = null;
}

function toggleSettings(type, e) {
  e.stopPropagation();
  const panel = document.getElementById(`player${type.charAt(0).toUpperCase() + type.slice(1)}Panel`);
  const isOpen = panel.classList.contains('open');
  closeAllSettings();
  if (!isOpen) panel.classList.add('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.player-settings-group')) closeAllSettings();
});

function seekPlayer(e) {
  const bar = $('#playerProgress');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const player = $('#player');
  if (player.duration) player.currentTime = pct * player.duration;
}

function toggleMute() {
  const player = $('#player');
  player.muted = !player.muted;
  $('#playerMuteBtn').textContent = player.muted ? '🔇' : '🔊';
  $('#playerVolume').value = player.muted ? 0 : (player.volume || 1);
}

function setVolume(val) {
  const player = $('#player');
  player.volume = +val;
  player.muted = +val === 0;
  $('#playerMuteBtn').textContent = +val === 0 ? '🔇' : (+val < 0.5 ? '🔉' : '🔊');
}

document.addEventListener('fullscreenchange', () => {
  const o = $('#playerOverlay');
  if (!document.fullscreenElement && o.classList.contains('open')) {
    o.style.height = window.innerHeight + 'px';
  }
});

function toggleFullscreen() {
  const wrap = $('#playerVideoWrap');
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    wrap.requestFullscreen?.() || wrap.webkitRequestFullscreen?.();
  }
}

function formatTime(t) {
  if (!t || !isFinite(t)) return '0:00';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ---- Player event listeners ----

const player = $('#player');
const overlay_ = $('#playerOverlay');

player.addEventListener('timeupdate', () => {
  const fill = $('#playerProgressFill');
  const time = $('#playerTime');
  if (player.duration) {
    fill.style.width = `${(player.currentTime / player.duration) * 100}%`;
    time.textContent = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
  }
});

player.addEventListener('progress', () => {
  if (player.buffered.length) {
    const buf = player.buffered.end(player.buffered.length - 1);
    const buffer = $('#playerBuffer');
    if (player.duration) buffer.style.width = `${(buf / player.duration) * 100}%`;
  }
});

player.addEventListener('play', () => {
  $('#playerPlayBtn').textContent = '⏸';
  $('#playerCenterPlay').classList.remove('show');
  showControls();
  hideControls(3000);
});

player.addEventListener('pause', () => {
  $('#playerPlayBtn').textContent = '▶';
  $('#playerCenterPlay').classList.add('show');
  showControls();
});

player.addEventListener('ended', () => {
  if (!ps.isSeries || ps.episodes.indexOf(ps.ep) >= ps.episodes.length - 1) {
    $('#playerCenterPlay').classList.add('show');
    $('#playerCenterPlay').textContent = '↻';
    return;
  }
  nextEpisode();
});

player.addEventListener('loadedmetadata', () => {
  const time = $('#playerTime');
  time.textContent = `0:00 / ${formatTime(player.duration)}`;
});

player.addEventListener('error', () => {
  console.error('Player error');
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closePlayer(); }
  if (overlay_.classList.contains('open')) {
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
    if (e.key === 'f') toggleFullscreen();
    if (e.key === 'm') toggleMute();
    if (e.key === 'ArrowLeft') { player.currentTime = Math.max(0, player.currentTime - 10); }
    if (e.key === 'ArrowRight') { player.currentTime = Math.min(player.duration, player.currentTime + 10); }
    if (e.key === 'ArrowUp') { setVolume(Math.min(1, player.volume + 0.1)); $('#playerVolume').value = player.volume; }
    if (e.key === 'ArrowDown') { setVolume(Math.max(0, player.volume - 0.1)); $('#playerVolume').value = player.volume; }
    if (e.key === 'n') nextEpisode();
    if (e.key === 'p') prevEpisode();
  }
});

function closePlayer() {
  overlay_.classList.remove('open');
  player.pause();
  player.removeAttribute('src');
  player.load();
  closeAllSettings();
  ps.sid = null;
}

/* ---- Init ---- */
loadHome();
</script>
</body>
</html>
